name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  validate-world:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate example worlds
        run: |
          validate_world() {
            node dist/cli/neuroverse.js validate --world "$1"
            local code=$?
            if [ $code -eq 0 ] || [ $code -eq 2 ]; then
              return 0  # pass (0) and warn (2) are acceptable
            fi
            return $code  # fail (1) and error (3) are not
          }
          validate_world docs/worlds/configurator-governance
          validate_world docs/worlds/post-web-world
